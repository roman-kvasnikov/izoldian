<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Book/note shape -->
  <g transform="translate(256,256)">
    <!-- Page -->
    <rect x="-120" y="-150" width="210" height="280" rx="12" fill="white" opacity="0.95"/>
    <!-- Folded corner -->
    <path d="M90,-150 L90,-110 L50,-110 Z" fill="#e0e7ff"/>
    <path d="M50,-150 L90,-150 L90,-110 Z" fill="#c7d2fe"/>
    <!-- Text lines -->
    <rect x="-90" y="-100" width="130" height="8" rx="4" fill="#3b82f6" opacity="0.6"/>
    <rect x="-90" y="-76" width="100" height="8" rx="4" fill="#3b82f6" opacity="0.4"/>
    <rect x="-90" y="-52" width="140" height="8" rx="4" fill="#3b82f6" opacity="0.3"/>
    <rect x="-90" y="-28" width="80" height="8" rx="4" fill="#3b82f6" opacity="0.4"/>
    <rect x="-90" y="-4" width="120" height="8" rx="4" fill="#3b82f6" opacity="0.3"/>
    <!-- Connection nodes (knowledge graph) -->
    <circle cx="30" cy="60" r="16" fill="#3b82f6" opacity="0.8"/>
    <circle cx="-50" cy="80" r="12" fill="#8b5cf6" opacity="0.7"/>
    <circle cx="60" cy="100" r="10" fill="#6366f1" opacity="0.6"/>
    <!-- Connection lines -->
    <line x1="30" y1="60" x2="-50" y2="80" stroke="white" stroke-width="2.5" opacity="0.5"/>
    <line x1="30" y1="60" x2="60" y2="100" stroke="white" stroke-width="2.5" opacity="0.5"/>
    <!-- Dots in nodes -->
    <circle cx="30" cy="60" r="5" fill="white"/>
    <circle cx="-50" cy="80" r="4" fill="white"/>
    <circle cx="60" cy="100" r="3" fill="white"/>
  </g>
</svg>
