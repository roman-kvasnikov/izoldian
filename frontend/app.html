<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Izoldian</title>
		<script src="https://cdn.tailwindcss.com"></script>
		<script
			defer
			src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"
		></script>
		<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.8/dist/purify.min.js"></script>
		<link
			id="hljs-theme"
			rel="stylesheet"
			href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css"
		/>
		<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/highlight.min.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
		<script
			id="MathJax-script"
			async
			src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"
		></script>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300..700&display=swap" rel="stylesheet" />
	<link rel="stylesheet" href="/css/styles.css" />
	</head>
	<body class="bg-gray-900 text-gray-100 h-screen overflow-hidden">
		<div
			x-data="noteApp()"
			x-init="init()"
			class="flex h-screen"
			@keydown.window="handleKeydown($event)"
		>
			<!-- Icon Rail -->
			<div
				id="icon-rail"
				class="w-14 bg-gray-950 flex flex-col items-center py-3 gap-1.5 border-r border-gray-800 shrink-0"
			>
				<button
					@click="if(isMobile){sidebarOpen=true}; sidebarPanel='files'"
					:class="sidebarPanel === 'files' ? 'bg-gray-700 text-blue-400' : 'text-gray-500 hover:text-gray-300'"
					class="w-10 h-10 rounded-lg flex items-center justify-center transition"
					:title="t('sidebar.files')"
				>
					<svg
						class="w-6 h-6"
						fill="none"
						stroke="currentColor"
						viewBox="0 0 24 24"
					>
						<path
							stroke-linecap="round"
							stroke-linejoin="round"
							stroke-width="2"
							d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"
						/>
					</svg>
				</button>
				<button
					@click="if(isMobile){sidebarOpen=true}; sidebarPanel='search'"
					:class="sidebarPanel === 'search' ? 'bg-gray-700 text-blue-400' : 'text-gray-500 hover:text-gray-300'"
					class="w-10 h-10 rounded-lg flex items-center justify-center transition"
					:title="t('sidebar.search')"
				>
					<svg
						class="w-6 h-6"
						fill="none"
						stroke="currentColor"
						viewBox="0 0 24 24"
					>
						<path
							stroke-linecap="round"
							stroke-linejoin="round"
							stroke-width="2"
							d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
						/>
					</svg>
				</button>
				<button
					@click="if(isMobile){sidebarOpen=true}; sidebarPanel='tags'"
					:class="sidebarPanel === 'tags' ? 'bg-gray-700 text-blue-400' : 'text-gray-500 hover:text-gray-300'"
					class="w-10 h-10 rounded-lg flex items-center justify-center transition"
					:title="t('sidebar.tags')"
				>
					<svg
						class="w-6 h-6"
						fill="none"
						stroke="currentColor"
						viewBox="0 0 24 24"
					>
						<path
							stroke-linecap="round"
							stroke-linejoin="round"
							stroke-width="2"
							d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"
						/>
					</svg>
				</button>
				<button
					@click="if(isMobile){sidebarOpen=true}; sidebarPanel='outline'"
					:class="sidebarPanel === 'outline' ? 'bg-gray-700 text-blue-400' : 'text-gray-500 hover:text-gray-300'"
					class="w-10 h-10 rounded-lg flex items-center justify-center transition"
					:title="t('sidebar.outline')"
				>
					<svg
						class="w-6 h-6"
						fill="none"
						stroke="currentColor"
						viewBox="0 0 24 24"
					>
						<path
							stroke-linecap="round"
							stroke-linejoin="round"
							stroke-width="2"
							d="M4 6h16M4 10h16M4 14h16M4 18h16"
						/>
					</svg>
				</button>
				<button
					@click="toggleGraph()"
					:class="showGraph ? 'bg-gray-700 text-blue-400' : 'text-gray-500 hover:text-gray-300'"
					class="w-10 h-10 rounded-lg flex items-center justify-center transition"
					:title="t('sidebar.graph')"
				>
					<svg
						class="w-6 h-6"
						fill="none"
						stroke="currentColor"
						viewBox="0 0 24 24"
					>
						<circle cx="6" cy="6" r="2" stroke-width="2" />
						<circle cx="18" cy="18" r="2" stroke-width="2" />
						<circle cx="18" cy="6" r="2" stroke-width="2" />
						<path stroke-width="2" d="M8 6h8M7 8l9 8" />
					</svg>
				</button>

				<div class="flex-1"></div>

				<!-- Settings button -->
				<button
					@click="showSettings = true"
					class="w-10 h-10 rounded-lg flex items-center justify-center text-gray-500 hover:text-gray-300 transition"
					:title="t('settings.title')"
				>
					<svg
						class="w-6 h-6"
						fill="none"
						stroke="currentColor"
						viewBox="0 0 24 24"
					>
						<path
							stroke-linecap="round"
							stroke-linejoin="round"
							stroke-width="2"
							d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"
						/>
						<path
							stroke-linecap="round"
							stroke-linejoin="round"
							stroke-width="2"
							d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
						/>
					</svg>
				</button>
			</div>

			<!-- Sidebar backdrop (mobile) -->
			<div
				x-show="isMobile && sidebarOpen"
				@click="sidebarOpen = false"
				class="fixed inset-0 bg-black/50 z-30"
				x-transition:enter="transition ease-out duration-200"
				x-transition:enter-start="opacity-0"
				x-transition:enter-end="opacity-100"
				x-transition:leave="transition ease-in duration-150"
				x-transition:leave-start="opacity-100"
				x-transition:leave-end="opacity-0"
			></div>

			<!-- Sidebar -->
			<div
				id="sidebar"
				x-show="!isMobile || sidebarOpen"
				x-transition:enter="transition ease-out duration-200"
				x-transition:enter-start="-translate-x-full"
				x-transition:enter-end="translate-x-0"
				x-transition:leave="transition ease-in duration-150"
				x-transition:leave-start="translate-x-0"
				x-transition:leave-end="-translate-x-full"
				class="w-72 bg-gray-850 border-r border-gray-800 flex flex-col shrink-0 overflow-hidden"
				style="background: var(--sidebar)"
				:style="isMobile ? {} : { width: sidebarWidth + 'px' }"
			>
				<!-- Sidebar Header -->
				<div
					class="p-3 border-b border-gray-800 flex items-center justify-between"
				>
					<span
						class="text-base font-medium text-gray-300"
						x-text="sidebarTitle()"
					></span>
					<div class="flex items-center gap-1.5">
						<template x-if="sidebarPanel === 'files'">
							<button
								@click="showNewNoteDialog()"
								class="text-gray-500 hover:text-gray-300 transition"
								:title="t('sidebar.new_note')"
							>
								<svg
									class="w-5 h-5"
									fill="none"
									stroke="currentColor"
									viewBox="0 0 24 24"
								>
									<path
										stroke-linecap="round"
										stroke-linejoin="round"
										stroke-width="2"
										d="M12 4v16m8-8H4"
									/>
								</svg>
							</button>
						</template>
						<template x-if="sidebarPanel === 'files'">
							<button
								@click="showNewFolderDialog()"
								class="text-gray-500 hover:text-gray-300 transition"
								:title="t('sidebar.new_folder')"
							>
								<svg
									class="w-5 h-5"
									fill="none"
									stroke="currentColor"
									viewBox="0 0 24 24"
								>
									<path
										stroke-linecap="round"
										stroke-linejoin="round"
										stroke-width="2"
										d="M9 13h6m-3-3v6m-9 1V7a2 2 0 012-2h6l2 2h6a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z"
									/>
								</svg>
							</button>
						</template>
						<template x-if="isMobile">
							<button
								@click="sidebarOpen = false"
								class="text-gray-500 hover:text-gray-300 transition ml-1"
							>
								<svg
									class="w-5 h-5"
									fill="none"
									stroke="currentColor"
									viewBox="0 0 24 24"
								>
									<path
										stroke-linecap="round"
										stroke-linejoin="round"
										stroke-width="2"
										d="M6 18L18 6M6 6l12 12"
									/>
								</svg>
							</button>
						</template>
					</div>
				</div>

				<!-- Files Panel (rendered via JS for recursive depth) -->
				<div
					x-show="sidebarPanel === 'files'"
					class="flex-1 overflow-y-auto p-2"
				>
					<div
						x-ref="fileTreeContainer"
						x-html="renderFileTreeHTML(fileTree, 0) || ''"
					></div>
				</div>

				<!-- Search Panel -->
				<div
					x-show="sidebarPanel === 'search'"
					class="flex-1 overflow-y-auto flex flex-col"
				>
					<div class="p-2">
						<input
							x-model="searchQuery"
							@input.debounce.300ms="doSearch()"
							type="text"
							:placeholder="t('search.placeholder')"
							class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-blue-500 text-white placeholder-gray-500"
						/>
					</div>
					<div class="flex-1 overflow-y-auto px-2">
						<template x-for="result in searchResults" :key="result.path">
							<div
								@click="openNote(result.path)"
								class="p-2.5 rounded-lg hover:bg-gray-800 cursor-pointer mb-1"
							>
								<div
									class="text-sm text-gray-200 font-medium"
									x-text="result.name"
								></div>
								<div
									class="text-xs text-gray-500 mt-0.5"
									x-text="result.path"
								></div>
								<div
									class="text-xs text-gray-400 mt-1"
									x-text="result.snippets?.[0]?.substring(0, 100)"
								></div>
								<div
									class="text-xs text-blue-400 mt-0.5"
									x-text="result.matches + ' ' + t('search.matches')"
								></div>
							</div>
						</template>
						<div
							x-show="searchQuery && searchResults.length === 0"
							class="text-sm text-gray-500 p-2"
							x-text="t('sidebar.nothing_found')"
						></div>
					</div>
				</div>

				<!-- Tags Panel -->
				<div
					x-show="sidebarPanel === 'tags'"
					class="flex-1 overflow-y-auto p-2"
				>
					<div class="flex flex-wrap gap-2">
						<template x-for="tag in allTags" :key="tag.name">
							<button
								@click="toggleTagFilter(tag.name)"
								class="px-3 py-1.5 rounded-full text-sm font-medium transition"
								:class="selectedTags.includes(tag.name) ? 'bg-blue-600 text-white' : 'bg-gray-800 text-gray-400 hover:bg-gray-700'"
							>
								<span x-text="tag.name"></span>
								<span
									class="ml-1 opacity-60"
									x-text="'(' + tag.count + ')'"
								></span>
							</button>
						</template>
					</div>
					<div
						x-show="allTags.length === 0"
						class="text-sm text-gray-500 mt-2"
						x-text="t('sidebar.no_tags')"
					></div>
				</div>

				<!-- Outline Panel -->
				<div
					x-show="sidebarPanel === 'outline'"
					class="flex-1 overflow-y-auto p-2"
				>
					<template x-for="heading in outline" :key="heading.id">
						<div
							@click="scrollToHeading(heading.id)"
							class="py-1.5 px-2 rounded cursor-pointer text-sm text-gray-400 hover:bg-gray-800 hover:text-gray-200 truncate"
							:style="{ paddingLeft: (heading.level - 1) * 14 + 8 + 'px' }"
						>
							<span x-text="heading.text"></span>
						</div>
					</template>
					<div
						x-show="outline.length === 0"
						class="text-sm text-gray-500"
						x-text="t('sidebar.no_headings')"
					></div>
				</div>
			</div>

			<!-- Sidebar Resize Handle -->
			<div
				id="resize-handle"
				class="w-1 bg-gray-800 cursor-col-resize hover:bg-blue-600 transition"
				@mousedown="startResize($event)"
			></div>

			<!-- Main Content Area -->
			<div id="main-content" class="flex-1 flex flex-col overflow-hidden">
				<!-- Toolbar: title bar -->
				<div
					class="bg-gray-850 border-b border-gray-800 flex items-center px-4 py-2.5 gap-3 shrink-0"
					style="background: var(--sidebar)"
				>
					<!-- Breadcrumb -->
					<div class="flex items-center gap-2 text-gray-400 flex-1 min-w-0">
						<template x-if="currentNote">
							<div class="flex items-center gap-2 truncate">
								<span
									class="text-gray-500 text-sm"
									x-text="currentNote.path.replace(currentNote.path.split('/').pop(), '')"
								></span>
								<span
									@dblclick="showRenameDialog()"
									class="text-gray-100 text-lg font-semibold cursor-pointer hover:text-blue-300"
									x-text="currentNote.name"
									title="Двойной клик для переименования"
								></span>
								<button
									@click="showRenameDialog()"
									class="text-gray-600 hover:text-gray-300 transition ml-1"
									:title="t('notes.rename') + ' (F2)'"
								>
									<svg
										class="w-5 h-5"
										fill="none"
										stroke="currentColor"
										viewBox="0 0 24 24"
									>
										<path
											stroke-linecap="round"
											stroke-linejoin="round"
											stroke-width="2"
											d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"
										/>
									</svg>
								</button>
								<button
									@click="openShareDialog()"
									class="transition ml-0.5"
									:class="isNoteShared(currentNote.path) ? 'text-green-500 hover:text-green-400' : 'text-gray-600 hover:text-gray-300'"
									:title="t('share.title')"
								>
									<svg
										class="w-5 h-5"
										fill="none"
										stroke="currentColor"
										viewBox="0 0 24 24"
									>
										<path
											stroke-linecap="round"
											stroke-linejoin="round"
											stroke-width="2"
											d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"
										/>
									</svg>
								</button>
								<button
									@click="deleteCurrentNote()"
									class="text-gray-600 hover:text-red-400 transition ml-0.5"
									:title="t('common.delete')"
								>
									<svg
										class="w-5 h-5"
										fill="none"
										stroke="currentColor"
										viewBox="0 0 24 24"
									>
										<path
											stroke-linecap="round"
											stroke-linejoin="round"
											stroke-width="2"
											d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"
										/>
									</svg>
								</button>
								<span x-show="unsaved" class="text-yellow-500 text-base ml-1"
									>&#9679;</span
								>
							</div>
						</template>
						<template x-if="!currentNote">
							<span
								class="text-gray-500"
								x-text="t('editor.select_note')"
							></span>
						</template>
					</div>

					<!-- View mode buttons -->
					<div class="flex items-center gap-0.5 bg-gray-800 rounded-lg p-0.5">
						<button
							@click="viewMode = 'edit'"
							:class="viewMode === 'edit' ? 'bg-gray-700 text-white' : 'text-gray-500'"
							class="px-2.5 py-1.5 rounded text-xs transition"
							:title="t('editor.edit')"
						>
							<svg
								class="w-5 h-5"
								fill="none"
								stroke="currentColor"
								viewBox="0 0 24 24"
							>
								<path
									stroke-linecap="round"
									stroke-linejoin="round"
									stroke-width="2"
									d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"
								/>
							</svg>
						</button>
						<button
							@click="viewMode = 'split'"
							:class="viewMode === 'split' ? 'bg-gray-700 text-white' : 'text-gray-500'"
							class="px-2.5 py-1.5 rounded text-xs transition"
							:title="t('editor.split')"
						>
							<svg
								class="w-5 h-5"
								fill="none"
								stroke="currentColor"
								viewBox="0 0 24 24"
							>
								<path
									stroke-linecap="round"
									stroke-linejoin="round"
									stroke-width="2"
									d="M9 17V7m0 10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2m0 10a2 2 0 002 2h2a2 2 0 002-2M9 7a2 2 0 012-2h2a2 2 0 012 2m0 10V7"
								/>
							</svg>
						</button>
						<button
							@click="viewMode = 'preview'"
							:class="viewMode === 'preview' ? 'bg-gray-700 text-white' : 'text-gray-500'"
							class="px-2.5 py-1.5 rounded text-xs transition"
							:title="t('editor.preview')"
						>
							<svg
								class="w-5 h-5"
								fill="none"
								stroke="currentColor"
								viewBox="0 0 24 24"
							>
								<path
									stroke-linecap="round"
									stroke-linejoin="round"
									stroke-width="2"
									d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
								/>
								<path
									stroke-linecap="round"
									stroke-linejoin="round"
									stroke-width="2"
									d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
								/>
							</svg>
						</button>
					</div>
				</div>

				<!-- Editor & Preview -->
				<div class="flex-1 flex overflow-hidden" x-show="currentNote">
					<!-- Editor -->
					<div
						class="flex-1 flex flex-col overflow-hidden"
						x-show="viewMode === 'edit' || viewMode === 'split'"
						:class="viewMode === 'split' ? 'w-1/2 border-r border-gray-800' : ''"
					>
						<!-- Format toolbar -->
						<div
							id="format-toolbar"
							class="flex items-center gap-0.5 px-3 py-2 border-b border-gray-800 bg-gray-900 shrink-0 flex-wrap"
						>
							<button
								@click="formatText('bold')"
								class="format-btn"
								:title="t('format.bold') + ' (Ctrl+B)'"
							>
								<b>B</b>
							</button>
							<button
								@click="formatText('italic')"
								class="format-btn italic"
								:title="t('format.italic') + ' (Ctrl+I)'"
							>
								<i>I</i>
							</button>
							<button
								@click="formatText('strikethrough')"
								class="format-btn line-through"
								:title="t('format.strikethrough')"
							>
								<s>S</s>
							</button>
							<button
								@click="formatText('code')"
								class="format-btn font-mono"
								:title="t('format.code')"
							>
								&lt;/&gt;
							</button>

						>
							<template x-for="loc in availableLocales" :key="loc.code">
								<option
									:value="loc.code"
									:selected="loc.code === currentLocale"
									x-text="loc.flag + ' ' + loc.name"
								></option>
							</template>
						</select>
					</div>

					<div
						class="flex items-center justify-between pt-2 border-t border-gray-700"
					>
						<button
							@click="logout()"
							class="px-4 py-2 text-sm text-red-400 hover:text-red-300 transition"
							x-text="t('settings.logout')"
						></button>
						<button
							@click="showSettings = false"
							class="px-4 py-2 text-sm text-gray-400 hover:text-gray-200"
							x-text="t('common.close')"
						></button>
					</div>
				</div>
			</div>

			<!-- Quick Switcher -->
			<div
				x-show="showQuickSwitch"
				class="fixed inset-0 bg-black/60 z-50 flex items-start justify-center pt-[20vh]"
				@click.self="showQuickSwitch = false"
			>
				<div
					class="bg-gray-800 border border-gray-700 rounded-xl w-[calc(100%-2rem)] max-w-[540px] shadow-xl overflow-hidden"
				>
					<input
						x-model="quickSwitchQuery"
						x-ref="quickSwitchInput"
						@input="filterQuickSwitch()"
						@keydown.enter="selectQuickSwitch()"
						@keydown.escape="showQuickSwitch = false"
						@keydown.down.prevent="quickSwitchIdx = Math.min(quickSwitchIdx+1, quickSwitchFiltered.length-1)"
						@keydown.up.prevent="quickSwitchIdx = Math.max(quickSwitchIdx-1, 0)"
						type="text"
						:placeholder="t('quick_switcher.placeholder')"
						class="w-full bg-gray-800 px-5 py-3.5 text-sm focus:outline-none text-white placeholder-gray-500 border-b border-gray-700"
					/>
					<div class="max-h-80 overflow-y-auto">
						<template
							x-for="(item, idx) in quickSwitchFiltered"
							:key="item.path"
						>
							<div
								@click="openNote(item.path); showQuickSwitch = false"
								class="px-5 py-2.5 cursor-pointer text-sm"
								:class="idx === quickSwitchIdx ? 'bg-blue-900/40 text-blue-300' : 'text-gray-400 hover:bg-gray-700'"
							>
								<span x-text="item.name" class="font-medium"></span>
								<span
									class="text-xs text-gray-600 ml-2"
									x-text="item.path"
								></span>
							</div>
						</template>
					</div>
				</div>
			</div>
		</div>

		<script src="/js/app.js?v=7"></script>
	</body>
</html>
